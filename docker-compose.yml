version: "3.8"

services:
  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: swasthya-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./src:/app/src

  # ── Redis (Task State) ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: swasthya-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

